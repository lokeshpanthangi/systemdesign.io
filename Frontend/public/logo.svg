<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Hummingbird logo - minimalist line art -->
  <!-- Upper wing (leaf shape) -->
  <path d="M 50 15 C 35 15, 25 30, 30 48 C 35 35, 45 28, 55 30 C 60 20, 58 15, 50 15 Z" stroke="currentColor" fill="none"/>
  <!-- Lower wing -->
  <path d="M 55 30 C 62 28, 72 30, 75 38 C 70 36, 62 36, 55 40" stroke="currentColor" fill="none"/>
  <!-- Body -->
  <path d="M 30 48 C 28 55, 30 62, 38 68 L 45 60 C 40 58, 36 52, 38 46" stroke="currentColor" fill="none"/>
  <!-- Beak -->
  <path d="M 45 60 L 55 55 C 60 52, 65 48, 70 42" stroke="currentColor" fill="none"/>
  <!-- Head curve connecting to beak -->
  <path d="M 55 40 C 55 45, 55 50, 55 55" stroke="currentColor" fill="none"/>
  <!-- Tail -->
  <path d="M 38 68 L 32 78" stroke="currentColor" fill="none"/>
</svg>
