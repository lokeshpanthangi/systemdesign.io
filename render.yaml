services:
  - type: web
    name: system-muse-lab-backend
    runtime: python
    rootDir: Backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 8000
    plan: free
    envVars:
      # Database
      - key: MONGO_URL
        sync: false
      - key: DATABASE_NAME
        value: systemdesign
      # Auth
      - key: JWT_SECRET
        sync: false
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
      # Admin
      - key: ADMIN_PASS
        sync: false
      # LangSmith (optional — remove if not using tracing)
      - key: LANGSMITH_TRACING
        value: true
      - key: LANGSMITH_ENDPOINT
        value: https://api.smith.langchain.com
      - key: LANGSMITH_API_KEY
        sync: false
      - key: LANGSMITH_PROJECT
        sync: false
      # YouTube API (optional)
      - key: YOUTUBE_API_KEY
        sync: false
